version: '3.8'

services:
  backend:
    build: ./backend
    container_name: neighbourhub_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/neighbourhub
      - JWT_SECRET=neighbourhub_super_secret_key_2026
      - JWT_EXPIRE=30d
      - NODE_ENV=production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:6.0
    container_name: neighbourhub_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: